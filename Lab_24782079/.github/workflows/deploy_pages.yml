name: Deploy Frontend SPA to GitHub Pages

on:
  push:
    branches: ["main", "master"] # Akan otomatis jalan setiap kamu push ke branch main atau master
  workflow_dispatch: # Mengizinkan kamu untuk menjalankan ulang secara manual dari web GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact (Hanya Folder Frontend)
        uses: actions/upload-pages-artifact@v3
        with:
          # WAJIB SAMA PERSIS DENGAN NAMA FOLDER FRONTEND SPA KAMU DI VS CODE
          path: './smartcity_citizen_spa_24782079'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4