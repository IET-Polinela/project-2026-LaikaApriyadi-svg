{% extends 'base.html' %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-header bg-white py-3">
        <h4 class="mb-0 fw-bold">Rincian Laporan</h4>
    </div>
    <div class="card-body">
        <h3>{{ object.title }}</h3>
        <p class="text-muted"><i class="bi bi-tag"></i> {{ object.category }} | <i class="bi bi-geo-alt"></i> {{ object.location }}</p>
        <hr>
        <h5>Deskripsi:</h5>
        <p class="lead">{{ object.description }}</p>
    </div>
    <div class="card-footer bg-white">
        <a href="{% url 'report_list' %}" class="btn btn-secondary">Kembali</a>
    </div>
</div>
{% endblock %}
