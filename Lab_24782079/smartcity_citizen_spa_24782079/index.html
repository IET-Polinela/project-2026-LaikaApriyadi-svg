<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Warga Smart City Tracker</title>
    <!-- Bootstrap 5 & Bootstrap Icons CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .spa-container { min-height: calc(100vh - 80px); }
    </style>
</head>
<body>

    <!-- Navbar Portal -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-buildings-fill me-2"></i>Smart City Portal
            </a>
            <div id="nav-menus" class="ms-auto"></div>
        </div>
    </nav>

    <!-- Main Container Tempat Suntik Komponen HTML SPA -->
    <main class="container-fluid px-4 mt-4 spa-container" id="app-content"></main>

    <!-- ========================================== -->
    <!-- BAGIAN BARU LAB 12: BOOTSTRAP MODAL FORM -->
    <!-- ========================================== -->
    <div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold" id="reportModalLabel">
                        <i class="bi bi-pencil-square me-2"></i>Buat Laporan Baru
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <!-- Form Pengajuan Laporan Smart City -->
                    <form id="reportForm">
                        
                        <!-- 1. Field Judul Laporan -->
                        <div class="mb-3">
                            <label for="inputTitle" class="form-label fw-bold small text-muted">Judul Laporan</label>
                            <input type="text" id="inputTitle" class="form-control" placeholder="Contoh: Lampu Jalan Padam" required style="border-radius: 8px;">
                        </div>

                        <!-- 2. Field Kategori Laporan -->
                        <div class="mb-3">
                            <label for="inputCategory" class="form-label fw-bold small text-muted">Kategori</label>
                            <select id="inputCategory" class="form-select" style="border-radius: 8px;">
                                <option value="INFRASTRUCTURE">Infrastruktur</option>
                                <option value="SECURITY">Keamanan / Ketertiban</option>
                                <option value="HEALTH">Kesehatan</option>
                                <option value="ENVIRONMENT">Lingkungan Hidup</option>
                            </select>
                        </div>

                        <!-- 3. Field Lokasi Kejadian -->
                        <div class="mb-3">
                            <label for="inputLocation" class="form-label fw-bold small text-muted">Lokasi / Alamat</label>
                            <input type="text" id="inputLocation" class="form-control" placeholder="Contoh: Jl. Soekarno Hatta No. 10" required style="border-radius: 8px;">
                        </div>

                        <!-- 4. Field Deskripsi Detail Laporan -->
                        <div class="mb-3">
                            <label for="inputDescription" class="form-label fw-bold small text-muted">Deskripsi Laporan</label>
                            <textarea id="inputDescription" class="form-control" rows="4" placeholder="Jelaskan secara rinci kronologi kejadian atau kondisi fasilitas publik..." required style="border-radius: 8px;"></textarea>
                        </div>

                        <!-- 5. Tombol Aksi Form Dinamis -->
                        <div class="d-flex justify-content-between mt-4">
                            <!-- Menggunakan type="button" secara mutlak untuk menghindari interupsi reload bawaan HTML (Figure 3) -->
                            <button type="button" class="btn btn-outline-secondary fw-bold px-4" id="btnDraft" style="border-radius: 10px;">Simpan Draft</button>
                            <button type="button" class="btn btn-primary fw-bold px-4" id="btnSubmit" style="border-radius: 10px;">
                                Ajukan <i class="bi bi-send-fill ms-1"></i>
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Pemanggilan Skrip JavaScript (Urutan Tetap Dipertahankan) -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
    <!-- Tambahan Bootstrap Bundle JS (Wajib di Lab 12 agar Modal Pop-Up bisa Terbuka & Tertutup via JS) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
